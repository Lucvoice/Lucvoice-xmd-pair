<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | Liquid Glass</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--primary:#7c3aed;
--secondary:#22d3ee;
--glass:rgba(255,255,255,0.08);
--glass2:rgba(255,255,255,0.12);
--border:rgba(255,255,255,0.18);
--text:#ffffff;
--muted:rgba(255,255,255,0.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#7c3aed 0%,transparent 35%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
linear-gradient(135deg,#050816,#0f172a,#020617);
overflow:hidden;
padding:20px;
}

/* floating blur bubbles */
body::before,
body::after{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;
filter:blur(80px);
z-index:0;
animation:float 8s ease-in-out infinite;
}

body::before{
background:#7c3aed;
top:-60px;
left:-60px;
}

body::after{
background:#06b6d4;
bottom:-60px;
right:-60px;
animation-delay:2s;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(30px)}
}

/* main glass card */
.card{
position:relative;
z-index:2;
width:100%;
max-width:430px;
padding:35px 28px;
border-radius:28px;
background:var(--glass);
backdrop-filter:blur(28px);
-webkit-backdrop-filter:blur(28px);
border:1px solid var(--border);
box-shadow:
0 10px 40px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.18),
inset 0 -1px 0 rgba(255,255,255,0.05);
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(135deg,
rgba(255,255,255,0.18),
transparent 35%,
transparent 60%,
rgba(255,255,255,0.08));
pointer-events:none;
}

.logo{
width:80px;
height:80px;
margin:auto;
border-radius:22px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:#fff;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
box-shadow:0 10px 25px rgba(124,58,237,.4);
}

h1{
text-align:center;
margin-top:18px;
font-size:28px;
font-weight:800;
color:#fff;
letter-spacing:.5px;
}

p{
text-align:center;
color:var(--muted);
font-size:14px;
margin-top:8px;
margin-bottom:28px;
}

label{
display:block;
font-size:13px;
color:#fff;
margin-bottom:10px;
font-weight:600;
}

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box i{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:rgba(255,255,255,.7);
}

input{
width:100%;
height:56px;
padding:0 18px 0 48px;
border:none;
outline:none;
border-radius:18px;
background:var(--glass2);
backdrop-filter:blur(18px);
color:#fff;
font-size:16px;
border:1px solid rgba(255,255,255,.14);
}

input::placeholder{
color:rgba(255,255,255,.45);
}

button{
width:100%;
height:56px;
border:none;
border-radius:18px;
cursor:pointer;
font-size:15px;
font-weight:700;
color:#fff;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
box-shadow:0 10px 25px rgba(0,0,0,.25);
transition:.25s;
}

button:hover{
transform:translateY(-2px) scale(1.01);
}

.result{
margin-top:22px;
padding:20px;
border-radius:22px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
text-align:center;
display:none;
}

.result h2{
font-size:13px;
letter-spacing:2px;
color:#9ae6ff;
margin-bottom:12px;
}

.code{
font-size:38px;
font-weight:800;
letter-spacing:8px;
color:#fff;
text-shadow:0 0 18px rgba(255,255,255,.4);
margin-bottom:14px;
}

.copy{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
}

.footer{
margin-top:22px;
text-align:center;
font-size:12px;
color:rgba(255,255,255,.55);
}
</style>
</head>
<body>

<div class="card">

<div class="logo">
<i class="fa-solid fa-shield-halved"></i>
</div>

<h1>LUCVOICE-XMD</h1>
<p>Official Liquid Glass Pairing Panel</p>

<label>Phone Number</label>

<div class="input-box">
<i class="fa-solid fa-phone"></i>
<input type="text" id="number" placeholder="2557XXXXXXXX">
</div>

<button onclick="generateCode()">
<i class="fa-solid fa-key"></i> Generate Code
</button>

<div class="result" id="result">
<h2>PAIRING CODE</h2>
<div class="code" id="code">1234-5678</div>
<button class="copy" onclick="copyCode()">Copy Code</button>
</div>

<div class="footer">
© 2026 LUCVOICE-XMD
</div>

</div>

<script>
function generateCode(){
let code=Math.floor(1000+Math.random()*9000)+"-"+Math.floor(1000+Math.random()*9000);
document.getElementById("code").innerText=code;
document.getElementById("result").style.display="block";
}

function copyCode(){
let text=document.getElementById("code").innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}
</script>

</body>
</html>
