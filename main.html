<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | XOS UI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--red:#ff003c;
--dark:#050505;
--glass:rgba(255,255,255,.06);
--border:rgba(255,255,255,.08);
--text:#ffffff;
--muted:rgba(255,255,255,.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#ff003c55,transparent 30%),
radial-gradient(circle at bottom right,#ff003c22,transparent 35%),
linear-gradient(135deg,#000,#0a0a0a,#120000);
padding:20px;
overflow:hidden;
}

.phone{
width:100%;
max-width:390px;
height:760px;
background:#000;
border-radius:38px;
padding:18px;
position:relative;
overflow:hidden;
box-shadow:
0 0 0 2px #222,
0 0 45px rgba(255,0,60,.25);
}

.phone::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top left,#ff003c33,transparent 35%),
radial-gradient(circle at bottom right,#ff003c22,transparent 45%);
z-index:0;
}

.topbar{
position:relative;
z-index:2;
display:flex;
justify-content:space-between;
color:#fff;
font-size:13px;
margin-bottom:20px;
}

.widget-row{
position:relative;
z-index:2;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:18px;
}

.widget{
height:110px;
border-radius:26px;
background:var(--glass);
backdrop-filter:blur(15px);
border:1px solid var(--border);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
box-shadow:0 0 18px rgba(255,0,60,.12);
}

.widget.main{
border:2px solid var(--red);
box-shadow:0 0 20px rgba(255,0,60,.45);
}

.widget i{
font-size:38px;
color:var(--red);
margin-bottom:8px;
}

.widget h2{
font-size:42px;
color:var(--red);
line-height:1;
}

.widget span{
font-size:12px;
color:var(--muted);
margin-top:6px;
}

.search{
position:relative;
z-index:2;
height:50px;
border-radius:28px;
background:#fff;
display:flex;
align-items:center;
padding:0 18px;
font-size:14px;
color:#666;
margin-bottom:22px;
}

.apps{
position:relative;
z-index:2;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-top:10px;
}

.app{
height:170px;
border-radius:28px;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(16px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
cursor:pointer;
transition:.3s;
box-shadow:0 0 18px rgba(255,0,60,.12);
}

.app:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 0 24px rgba(255,0,60,.45);
}

.icon{
width:85px;
height:85px;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
margin-bottom:14px;
background:linear-gradient(145deg,#1b1b1b,#000);
color:var(--red);
box-shadow:
0 0 18px rgba(255,0,60,.35),
inset 0 0 8px rgba(255,255,255,.05);
}

.app h3{
font-size:18px;
}

.app p{
font-size:12px;
color:var(--muted);
margin-top:4px;
}

.footer{
position:absolute;
left:18px;
right:18px;
bottom:20px;
height:68px;
border-radius:24px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(16px);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:13px;
z-index:2;
}

.line{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
border-radius:10px;
background:#fff;
opacity:.7;
z-index:3;
}
</style>
</head>

<body>

<div class="phone">

<div class="topbar">
<span>00:06</span>
<span>📶 🔋52%</span>
</div>

<div class="widget-row">

<div class="widget main">
<i class="fas fa-microchip"></i>
<span>Active Matrix</span>
</div>

<div class="widget">
<h2>16</h2>
<span>XOS Explore</span>
</div>

</div>

<div class="search">
<i class="fas fa-search"></i>&nbsp; Search...
</div>

<div class="apps">

<div class="app" onclick="window.location.href='/qr'">
<div class="icon">
<i class="fas fa-qrcode"></i>
</div>
<h3>QR Code</h3>
<p>Scan & Connect</p>
</div>

<div class="app" onclick="window.location.href='/pair'">
<div class="icon">
<i class="fas fa-link"></i>
</div>
<h3>Pairing</h3>
<p>Fast Login</p>
</div>

</div>

<div class="footer">
LUCVOICE-XMD © 2026
</div>

<div class="line"></div>

</div>

</body>
</html>
