<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | XOS UI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#00ffe0;
--secondary:#0088ff;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.10);
--text:#fff;
--muted:rgba(255,255,255,0.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
overflow:hidden;
background:
radial-gradient(circle at top left,#00ffc333,transparent 40%),
radial-gradient(circle at bottom right,#0088ff33,transparent 40%),
linear-gradient(135deg,#020617,#0b1220,#000);
}

/* floating glow */
body::before,
body::after{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;
filter:blur(90px);
z-index:0;
animation:float 8s ease-in-out infinite;
}

body::before{
background:#00ffe033;
top:-70px;
left:-70px;
}

body::after{
background:#0088ff33;
bottom:-70px;
right:-70px;
animation-delay:4s;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(25px);}
}

/* PHONE / XOS SCREEN */
.phone{
width:100%;
max-width:360px;
height:680px;
padding:18px;
border-radius:28px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border:1px solid var(--border);
box-shadow:0 0 40px rgba(0,255,224,0.15);
position:relative;
z-index:2;
overflow:hidden;
}

/* topbar */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
font-size:11px;
color:var(--muted);
margin-bottom:18px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:var(--primary);
box-shadow:0 0 10px var(--primary);
}

/* logo */
.logo{
text-align:center;
margin-top:10px;
margin-bottom:25px;
}

.logo-box{
width:72px;
height:72px;
margin:auto;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:#fff;
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 25px rgba(0,255,224,0.35);
}

.logo h1{
margin-top:10px;
font-size:20px;
color:#fff;
font-weight:900;
}

.logo p{
font-size:11px;
color:var(--muted);
margin-top:4px;
}

/* apps grid */
.apps{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:20px;
}

.app{
height:160px;
border-radius:22px;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(16px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.25s;
}

.app:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(0,255,224,0.25);
}

.icon{
width:65px;
height:65px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
color:var(--primary);
background:rgba(0,0,0,0.3);
box-shadow:inset 0 0 10px rgba(255,255,255,0.05);
margin-bottom:10px;
}

.app h3{
color:#fff;
font-size:14px;
}

.app p{
font-size:11px;
color:var(--muted);
margin-top:3px;
}

/* footer */
.footer{
position:absolute;
bottom:16px;
left:18px;
right:18px;
text-align:center;
font-size:11px;
color:var(--muted);
}

/* home bar */
.home{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:80px;
height:4px;
border-radius:10px;
background:#fff;
opacity:.5;
}

</style>
</head>

<body>

<div class="phone">

<div class="topbar">
<div class="dot"></div>
<span>XOS UI</span>
<span>●</span>
</div>

<div class="logo">
<div class="logo-box">
<i class="fas fa-robot"></i>
</div>
<h1>LUCVOICE-XMD</h1>
<p>System Launcher Interface</p>
</div>

<div class="apps">

<div class="app" onclick="window.location.href='/qr'">
<div class="icon"><i class="fas fa-qrcode"></i></div>
<h3>QR Scan</h3>
<p>Connect device</p>
</div>

<div class="app" onclick="window.location.href='/pair'">
<div class="icon"><i class="fas fa-link"></i></div>
<h3>Pairing</h3>
<p>Login fast</p>
</div>

<div class="app">
<div class="icon"><i class="fas fa-bolt"></i></div>
<h3>Speed</h3>
<p>Optimized</p>
</div>

<div class="app">
<div class="icon"><i class="fas fa-cog"></i></div>
<h3>Settings</h3>
<p>System config</p>
</div>

</div>

<div class="footer">
LUCVOICE-XMD © 2026 • XOS SYSTEM
</div>

<div class="home"></div>

</div>

</body>
</html>
