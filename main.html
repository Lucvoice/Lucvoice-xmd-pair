<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | Edge Lighting UI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#00ffe0;
--secondary:#0088ff;
--pink:#ff00ff;
--glass:rgba(255,255,255,0.07);
--text:#fff;
--muted:rgba(255,255,255,0.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
background:
radial-gradient(circle at top left,#00ffc344,transparent 35%),
radial-gradient(circle at bottom right,#0066ff44,transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
}

/* MAIN CARD */
.card{
position:relative;
width:100%;
max-width:430px;
padding:35px 28px;
border-radius:30px;
background:var(--glass);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
overflow:hidden;
z-index:2;
}

/* EDGE LIGHTING */
.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:32px;
padding:2px;
background:linear-gradient(
45deg,
#00ffe0,
#0088ff,
#ff00ff,
#00ffe0
);
background-size:400% 400%;
animation:borderGlow 6s linear infinite;
z-index:-1;

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

@keyframes borderGlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* INNER SHINE */
.card::after{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.08),
transparent
);
transform:rotate(25deg);
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:#fff;
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 25px #00ffee88;
margin-bottom:18px;
position:relative;
z-index:2;
}

h1{
text-align:center;
font-size:30px;
font-weight:900;
color:#fff;
position:relative;
z-index:2;
}

.sub{
text-align:center;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
margin:8px 0 28px;
position:relative;
z-index:2;
}

.label{
text-align:center;
font-size:12px;
color:var(--muted);
margin-bottom:15px;
position:relative;
z-index:2;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
position:relative;
z-index:2;
}

.btn{
height:58px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:800;
cursor:pointer;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
transition:.25s;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.10);
}

.btn:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.12);
}

.btn.primary{
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 18px rgba(0,255,255,0.35);
}

.footer{
margin-top:22px;
text-align:center;
font-size:12px;
color:var(--muted);
line-height:1.7;
position:relative;
z-index:2;
}

.footer a{
color:#00ffee;
text-decoration:none;
font-weight:700;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<i class="fas fa-robot"></i>
</div>

<h1>LUCVOICE-XMD</h1>
<div class="sub">Edge Lighting Edition</div>

<div class="label">Choose Connection Method</div>

<div class="buttons">
<button class="btn primary" onclick="window.location.href='/qr'">
<i class="fas fa-qrcode"></i> QR Code
</button>

<button class="btn" onclick="window.location.href='/pair'">
<i class="fas fa-mobile-alt"></i> Pairing Code
</button>
</div>

<div class="footer">
Powered by <a href="#">LUCVOICE-XMD</a><br>
Support: <a href="https://wa.me/255768619068">WhatsApp</a>
</div>

</div>

</body>
</html>
