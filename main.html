<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD PAIRING</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
overflow:hidden;
}

.phone{
width:360px;
height:730px;
border-radius:35px;
padding:18px;
background:#000;
position:relative;
overflow:hidden;
box-shadow:
0 0 0 2px #222,
0 0 40px rgba(255,0,0,.25);
}

.phone::before{
content:'';
position:absolute;
inset:0;
background:
radial-gradient(circle at top left,#ff003c55,transparent 35%),
radial-gradient(circle at bottom right,#ff003c33,transparent 45%);
z-index:0;
}

.top{
position:relative;
z-index:2;
display:flex;
justify-content:space-between;
color:#fff;
font-size:13px;
margin-bottom:18px;
}

.search{
position:relative;
z-index:2;
height:50px;
border-radius:30px;
background:#fff;
display:flex;
align-items:center;
padding:0 18px;
font-size:14px;
color:#666;
margin-bottom:18px;
}

.apps{
position:relative;
z-index:2;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-top:25px;
}

.appbox{
height:180px;
border-radius:28px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
box-shadow:0 0 25px rgba(255,0,0,.12);
transition:.3s;
}

.appbox:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 0 25px rgba(255,0,0,.4);
}

.icon{
width:90px;
height:90px;
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
margin-bottom:15px;
background:linear-gradient(145deg,#1b1b1b,#000);
box-shadow:
0 0 20px rgba(255,0,0,.35),
inset 0 0 10px rgba(255,255,255,.05);
color:#ff003c;
}

.title{
font-size:18px;
font-weight:600;
}

.sub{
font-size:12px;
opacity:.7;
margin-top:4px;
}

.footer{
position:absolute;
bottom:18px;
left:18px;
right:18px;
height:68px;
border-radius:22px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
z-index:2;
font-size:14px;
}

.line{
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
border-radius:10px;
background:#fff;
opacity:.7;
z-index:3;
}
</style>
</head>
<body>

<div class="phone">

<div class="top">
<span>00:06</span>
<span>📶 🔋52%</span>
</div>

<div class="search">🔍 Search Pairing...</div>

<div class="apps">

<div class="appbox">
<div class="icon">🔗</div>
<div class="title">Pairing Code</div>
<div class="sub">Fast Connect Device</div>
</div>

<div class="appbox">
<div class="icon">📷</div>
<div class="title">QR Code</div>
<div class="sub">Scan & Login</div>
</div>

</div>

<div class="footer">
LUCVOICE-XMD © 2026
</div>

<div class="line"></div>

</div>

</body>
</html>
