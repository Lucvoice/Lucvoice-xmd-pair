<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | XOS Mini</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--red:#ff003c;
--dark:#000;
--glass:rgba(255,255,255,.06);
--border:rgba(255,255,255,.08);
--text:#fff;
--muted:rgba(255,255,255,.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
background:
radial-gradient(circle at top left,#ff003c44,transparent 30%),
radial-gradient(circle at bottom right,#ff003c22,transparent 35%),
linear-gradient(135deg,#000,#090909,#140000);
overflow:hidden;
}

.phone{
width:100%;
max-width:340px;
height:680px;
background:#050505;
border-radius:28px;
padding:18px;
position:relative;
overflow:hidden;
box-shadow:
0 0 0 2px #222,
0 0 35px rgba(255,0,60,.25);
}

/* TOPBAR MINIMAL */
.topbar{
position:relative;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
height:22px;
margin-bottom:14px;
}

.topbar .dot{
width:6px;
height:6px;
background:#ff003c;
border-radius:50%;
box-shadow:0 0 10px rgba(255,0,60,.6);
}

/* LOGO */
.logo{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
margin-top:10px;
margin-bottom:25px;
}

.logo-box{
width:70px;
height:70px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#fff;
background:linear-gradient(135deg,#ff003c,#7a001f);
box-shadow:0 0 18px rgba(255,0,60,.45);
margin-bottom:10px;
}

.logo h1{
font-size:20px;
color:#fff;
letter-spacing:1px;
font-weight:900;
}

.logo p{
font-size:11px;
color:var(--muted);
margin-top:3px;
}

/* APPS */
.apps{
position:relative;
z-index:2;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:10px;
}

.app{
height:170px;
border-radius:22px;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(16px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.3s;
box-shadow:0 0 15px rgba(255,0,60,.10);
}

.app:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 0 22px rgba(255,0,60,.35);
}

.icon{
width:75px;
height:75px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
background:linear-gradient(145deg,#181818,#000);
color:var(--red);
box-shadow:
0 0 15px rgba(255,0,60,.35),
inset 0 0 8px rgba(255,255,255,.05);
margin-bottom:12px;
}

.app h3{
font-size:16px;
color:#fff;
}

.app p{
font-size:11px;
color:var(--muted);
margin-top:4px;
}

/* FOOTER */
.footer{
position:absolute;
left:18px;
right:18px;
bottom:18px;
height:55px;
border-radius:18px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
color:#fff;
z-index:2;
}

/* HOME BAR */
.line{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:80px;
height:4px;
border-radius:10px;
background:#fff;
opacity:.6;
z-index:3;
}

</style>
</head>

<body>

<div class="phone">

<!-- MINIMAL TOPBAR -->
<div class="topbar">
<div class="dot"></div>
</div>

<div class="logo">
<div class="logo-box">
<i class="fas fa-robot"></i>
</div>
<h1>LUCVOICE-XMD</h1>
<p>Premium Connection UI</p>
</div>

<div class="apps">

<div class="app" onclick="window.location.href='/qr'">
<div class="icon">
<i class="fas fa-qrcode"></i>
</div>
<h3>QR Code</h3>
<p>Scan & Connect</p>
</div>

<div class="app" onclick="window.location.href='/pair'">
<div class="icon">
<i class="fas fa-link"></i>
</div>
<h3>Pairing</h3>
<p>Fast Login</p>
</div>

</div>

<div class="footer">
LUCVOICE-XMD © 2026
</div>

<div class="line"></div>

</div>

</body>
</html>
